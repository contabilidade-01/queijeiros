services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: rhapp
      POSTGRES_USER: rhapp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rhapp -d rhapp"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  # Alinha a palavra-passe do utilizador rhapp no volume antigo com DB_PASSWORD do Easypanel.
  # Partilha rede com postgres e liga a 127.0.0.1 (trust na imagem oficial) — sem apagar pgdata.
  db-password-fix:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    network_mode: "service:postgres"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for i in $$(seq 1 30); do
          psql -h 127.0.0.1 -U rhapp -d rhapp -c "SELECT 1" >/dev/null 2>&1 && break
          sleep 1
        done
        psql -h 127.0.0.1 -U rhapp -d rhapp -v ON_ERROR_STOP=1 \
          -c "ALTER USER rhapp WITH PASSWORD '$$POSTGRES_PASSWORD'"

  api:
    build: ./api
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rhapp
      DB_USER: rhapp
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-em-producao}
      PORT: 3001
      UPLOAD_DIR: /app/uploads
      # Recuperação de senha: URL pública do front (HTTPS em produção, sem / no fim)
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      db-password-fix:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s

  # Nome "web" (não "frontend"): o Easypanel rejeita serviço "frontend" no merge com
  # docker-compose.override.yml ("Additional property frontend is not allowed").
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: always
    # Não publicar 80 no host: evita conflito com o proxy do Easypanel. No domínio,
    # usar Serviço Compose: web, porta 80.
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
