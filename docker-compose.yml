services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: rhapp
      POSTGRES_USER: rhapp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rhapp -d rhapp"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  api:
    build: ./api
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rhapp
      DB_USER: rhapp
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-em-producao}
      PORT: 3001
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: always
    # Não publicar 80 no host: evita conflito com o proxy do Easypanel. O domínio
    # deve apontar para o serviço "frontend" na porta interna 80.
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
